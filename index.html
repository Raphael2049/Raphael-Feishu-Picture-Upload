<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>批量上传图片</title>
  <style>
    *{padding:10px;box-sizing:border-box;}
    button{background:#007bff;color:white;border:none;padding:10px 16px;border-radius:6px;cursor:pointer;}
    button:disabled{background:#ccc;}
    .status{margin-top:10px;color:red;}
  </style>
</head>
<body>
  <h3>批量上传图片到多维表格</h3>
  <select id="fieldSelect"><option>加载图片字段中...</option></select>
  <input type="file" id="fileInput" multiple accept="image/*">
  <button id="upload" disabled>开始上传</button>
  <div class="status" id="status"></div>

<script>
// ==========================================
// 飞书插件官方全局对象：window.parent.h5bs
// 不需要任何外部SDK！不需要lark！
// ==========================================
const bs = window.parent.h5bs;

let context = null;
let token = null;
let imageFieldId = null;

// 初始化
(async function init() {
  try {
    // 1. 获取当前表格上下文（自动获取）
    context = await bs.getContext();
    // 2. 获取鉴权token
    token = await bs.getAccessToken();

    showMsg("初始化成功，加载字段中...");

    // 3. 加载图片字段
    await loadImageFields();

    document.getElementById("upload").disabled = false;
    showMsg("加载完成，请选择图片并上传");
  } catch (e) {
    showMsg("初始化失败：" + e.message, true);
  }
})();

// 加载图片字段
async function loadImageFields() {
  const res = await fetch(`https://open.feishu.cn/open-apis/base/v1/tables/${context.tableId}/fields`, {
    headers: { Authorization: `Bearer ${token}` }
  });
  const json = await res.json();
  const fields = json.data.items.filter(f => f.field_type === 11); // 11=图片字段

  const select = document.getElementById("fieldSelect");
  select.innerHTML = "";

  fields.forEach(f => {
    const opt = document.createElement("option");
    opt.value = f.field_id;
    opt.innerText = f.field_name;
    select.appendChild(opt);
  });

  imageFieldId = fields[0]?.field_id;
  select.onchange = () => imageFieldId = select.value;
}

// 获取图片上传凭证
async function getTicket(file) {
  const res = await fetch("https://open.feishu.cn/open-apis/tenant/upload/prepare", {
    method: "POST",
    headers: {
      "Authorization": `Bearer ${token}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      file_name: file.name,
      file_size: file.size,
      parent_type: "base",
      parent_node: context.baseId,
      file_type: file.type
    })
  });
  const json = await res.json();
  return json.data;
}

// 上传文件
async function uploadFile(file, url) {
  await fetch(url, {
    method: "PUT",
    body: file,
    headers: { "Content-Type": "application/octet-stream" }
  });
}

// 创建记录
async function createRecord(ticket) {
  await fetch("https://open.feishu.cn/open-apis/base/v1/records", {
    method: "POST",
    headers: {
      "Authorization": `Bearer ${token}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      table_id: context.tableId,
      fields: { [imageFieldId]: [{ file_token: ticket }] }
    })
  });
}

// 上传按钮点击
document.getElementById("upload").onclick = async () => {
  const files = document.getElementById("fileInput").files;
  if (!files.length) return showMsg("请选择图片", true);

  const btn = document.getElementById("upload");
  btn.disabled = true;
  showMsg("开始上传...");

  try {
    for (let i = 0; i < files.length; i++) {
      const file = files[i];
      showMsg(`上传中 ${i+1}/${files.length}：${file.name}`);
      const { upload_url, ticket } = await getTicket(file);
      await uploadFile(file, upload_url);
      await createRecord(ticket);
    }
    showMsg("✅ 全部上传完成！");
  } catch (e) {
    showMsg("❌ 失败：" + e.message, true);
  } finally {
    btn.disabled = false;
  }
};

function showMsg(text, isError = false) {
  const s = document.getElementById("status");
  s.innerText = text;
  s.style.color = isError ? "red" : "green";
}
</script>
</body>
</html>
