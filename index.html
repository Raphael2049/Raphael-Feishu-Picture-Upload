<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>批量上传图片</title>
  <style>
    *{padding:10px;box-sizing:border-box;}
    button{background:#007bff;color:white;border:none;padding:10px 16px;border-radius:6px;cursor:pointer;}
    button:disabled{background:#ccc;}
    .status{margin-top:10px;color:red;}
  </style>
</head>
<body>
  <h3>批量上传图片到多维表格</h3>
  <select id="fieldSelect"><option>加载图片字段中...</option></select>
  <input type="file" id="fileInput" multiple accept="image/*">
  <button id="upload" disabled>开始上传</button>
  <div class="status" id="status"></div>

<script>
// 飞书官方内置对象
const bs = window.parent.h5bs;

let context = null;
let token = null;
let imageFieldId = null;

// 初始化
(async function init() {
  try {
    context = await bs.getContext();
    token = await bs.getAccessToken();

    showMsg("初始化成功，加载字段中...");

    // 👇 这里修复了！！！新版 API 必须加 bases/${context.baseId}
    await loadImageFields();

    document.getElementById("upload").disabled = false;
    showMsg("加载完成，请选择图片并上传");
  } catch (e) {
    showMsg("初始化失败：" + e.message, true);
  }
})();

// 加载图片字段（已修复）
async function loadImageFields() {
  const res = await fetch(`https://open.feishu.cn/open-apis/base/v1/bases/${context.baseId}/tables/${context.tableId}/fields`, {
    headers: { Authorization: `Bearer ${token}` }
  });
  const json = await res.json();
  
  // 打印日志方便你看
  console.log("字段列表", json);
  
  // 图片字段 = 17（新版飞书已改成 17！）
  const fields = json.data?.items?.filter(f => f.field_type === 17) || [];

  const select = document.getElementById("fieldSelect");
  select.innerHTML = "";

  if (fields.length === 0) {
    select.innerHTML = '<option>未找到图片字段</option>';
    return;
  }

  fields.forEach(f => {
    const opt = document.createElement("option");
    opt.value = f.field_id;
    opt.innerText = f.field_name;
    select.appendChild(opt);
  });

  imageFieldId = fields[0]?.field_id;
  select.onchange = () => imageFieldId = select.value;
}

// 获取上传凭证
async function getTicket(file) {
  const res = await fetch("https://open.feishu.cn/open-apis/tenant/upload/prepare", {
    method: "POST",
    headers: {
      "Authorization": `Bearer ${token}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      file_name: file.name,
      file_size: file.size,
      parent_type: "base",
      parent_node: context.baseId,
      file_type: file.type
    })
  });
  const json = await res.json();
  if (json.code !== 0) throw new Error(json.msg);
  return json.data;
}

// 上传文件
async function uploadFile(file, url) {
  await fetch(url, {
    method: "PUT",
    body: file,
    headers: { "Content-Type": "application/octet-stream" }
  });
}

// 创建记录
async function createRecord(ticket) {
  await fetch(`https://open.feishu.cn/open-apis/base/v1/bases/${context.baseId}/tables/${context.tableId}/records`, {
    method: "POST",
    headers: {
      "Authorization": `Bearer ${token}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      fields: { [imageFieldId]: [{ file_token: ticket }] }
    })
  });
}

// 上传
document.getElementById("upload").onclick = async () => {
  const files = document.getElementById("fileInput").files;
  if (!files.length) return showMsg("请选择图片", true);

  const btn = document.getElementById("upload");
  btn.disabled = true;
  showMsg("开始上传...");

  try {
    for (let i = 0; i < files.length; i++) {
      const file = files[i];
      showMsg(`上传中 ${i+1}/${files.length}：${file.name}`);
      const { upload_url, ticket } = await getTicket(file);
      await uploadFile(file, upload_url);
      await createRecord(ticket);
    }
    showMsg("✅ 全部上传完成！");
  } catch (e) {
    showMsg("❌ 失败：" + e.message, true);
  } finally {
    btn.disabled = false;
  }
};

function showMsg(text, isError = false) {
  const s = document.getElementById("status");
  s.innerText = text;
  s.style.color = isError ? "red" : "green";
}
</script>
</body>
</html>
