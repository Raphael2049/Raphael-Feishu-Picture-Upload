<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>飞书表格批量传图插件</title>
  <style>
    /* 简单样式，保证页面可用 */
    .container {
      padding: 20px;
      max-width: 600px;
      margin: 0 auto;
    }
    .tip {
      color: #666;
      margin: 10px 0;
      font-size: 14px;
    }
    .btn {
      margin: 10px 0;
      padding: 8px 16px;
      cursor: pointer;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
    }
    .btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .file-input, .field-select {
      margin: 10px 0;
      padding: 6px;
      width: 100%;
      box-sizing: border-box;
    }
    .status {
      margin-top: 15px;
      padding: 10px;
      border-radius: 4px;
      font-size: 14px;
    }
    .success {
      background: #d4edda;
      color: #155724;
    }
    .error {
      background: #f8d7da;
      color: #721c24;
    }
  </style>
</head>
<body>
  <div class="container">
    <h3>批量上传图片到飞书多维表格</h3>
    <!-- 上下文提示：自动显示baseId/tableId -->
    <div class="tip" id="contextTip">初始化中...</div>
    
    <!-- 图片字段选择：自动加载当前表格的图片字段 -->
    <div>
      <label>选择图片字段：</label>
      <select class="field-select" id="imageFieldSelect" disabled>
        <option value="">加载中...</option>
      </select>
    </div>
    
    <!-- 文件选择：替代硬编码的localImagePath -->
    <div>
      <label>选择本地图片（可多选）：</label>
      <input type="file" class="file-input" id="fileInput" multiple accept="image/png,image/jpg,image/jpeg,image/webp" disabled />
    </div>
    
    <!-- 上传按钮 -->
    <button class="btn" id="uploadBtn" disabled>开始批量上传</button>
    
    <!-- 上传状态提示 -->
    <div class="status" id="uploadStatus"></div>
  </div>

  <script>
    // 全局上下文：存储自动获取的baseId/tableId
    const globalContext = {
      baseId: '',
      tableId: ''
    };

    // 初始化：自动获取表格上下文 + 加载图片字段
    async function init() {
      try {
        // 1. 自动获取当前表格的baseId/tableId（替代硬编码）
        const context = await lark.base.context.get();
        globalContext.baseId = context.baseId;
        globalContext.tableId = context.tableId;
        document.getElementById('contextTip').textContent = 
          `已获取表格上下文：BaseID=${globalContext.baseId}，TableID=${globalContext.tableId}`;

        // 2. 加载当前表格的所有字段，筛选出图片类型字段
        await loadTableFields();

        // 3. 启用所有交互元素
        document.getElementById('imageFieldSelect').disabled = false;
        document.getElementById('fileInput').disabled = false;
        document.getElementById('uploadBtn').disabled = false;
      } catch (err) {
        document.getElementById('contextTip').textContent = `初始化失败：${err.message}`;
        document.getElementById('contextTip').style.color = 'red';
        console.error('初始化错误：', err);
      }
    }

    // 加载表格字段，筛选图片类型字段
    async function loadTableFields() {
      try {
        // 调用飞书API获取表格字段列表
        const res = await lark.base.api.get({
          url: `/open-apis/base/v1/bases/${globalContext.baseId}/tables/${globalContext.tableId}/fields`,
          method: 'GET'
        });

        // 筛选出图片类型的字段（field_type=11 是图片字段）
        const imageFields = res.data.items.filter(field => field.type === 11);
        const select = document.getElementById('imageFieldSelect');
        
        if (imageFields.length === 0) {
          select.innerHTML = '<option value="">当前表格无图片字段</option>';
          document.getElementById('uploadBtn').disabled = true;
          return;
        }

        // 填充下拉框
        select.innerHTML = imageFields.map(field => 
          `<option value="${field.id}">${field.name}</option>`
        ).join('');
      } catch (err) {
        document.getElementById('contextTip').textContent = `加载字段失败：${err.message}`;
        console.error('加载字段错误：', err);
      }
    }

    // 获取图片上传凭证
    async function getUploadTicket(file) {
      const res = await lark.base.api.post({
        url: '/open-apis/drive/v1/media/upload_all/create',
        method: 'POST',
        data: {
          file_name: file.name,
          file_size: file.size,
          parent_type: 'base',
          parent_node: globalContext.baseId,
          file_type: 'image'
        }
      });
      return res.data;
    }

    // 上传图片到临时地址
    async function uploadImageToUrl(file, uploadUrl) {
      const formData = new FormData();
      formData.append('file', file);
      const res = await fetch(uploadUrl, {
        method: 'POST',
        body: formData
      });
      if (!res.ok) throw new Error(`上传图片失败：${res.statusText}`);
      return await res.json();
    }

    // 批量写入表格记录
    async function batchCreateRecords(imageUrls, fieldId) {
      const records = imageUrls.map(url => ({
        fields: {
          [fieldId]: [
            {
              file_token: url.file_token,
              url: url.download_url
            }
          ]
        }
      }));

      const res = await lark.base.api.post({
        url: `/open-apis/base/v1/bases/${globalContext.baseId}/tables/${globalContext.tableId}/records/batch_create`,
        method: 'POST',
        data: {
          records: records
        }
      });
      return res.data;
    }

    // 批量上传主逻辑
    async function handleBatchUpload() {
      const fileInput = document.getElementById('fileInput');
      const fieldSelect = document.getElementById('imageFieldSelect');
      const status = document.getElementById('uploadStatus');
      const files = fileInput.files;
      const fieldId = fieldSelect.value;

      if (files.length === 0) {
        status.className = 'status error';
        status.textContent = '请选择要上传的图片！';
        return;
      }
      if (!fieldId) {
        status.className = 'status error';
        status.textContent = '请选择图片字段！';
        return;
      }

      // 禁用按钮，防止重复点击
      document.getElementById('uploadBtn').disabled = true;
      status.className = 'status';
      status.textContent = `开始上传${files.length}张图片...`;

      try {
        // 批量处理每张图片
        const imageUrls = [];
        for (let i = 0; i < files.length; i++) {
          const file = files[i];
          status.textContent = `正在上传第${i+1}/${files.length}张：${file.name}`;
          
          // 1. 获取上传凭证
          const ticket = await getUploadTicket(file);
          // 2. 上传图片到临时地址
          const uploadRes = await uploadImageToUrl(file, ticket.upload_url);
          imageUrls.push({
            file_token: ticket.file_token,
            download_url: uploadRes.download_url
          });
        }

        // 3. 批量写入表格
        await batchCreateRecords(imageUrls, fieldId);

        // 上传成功提示
        status.className = 'status success';
        status.textContent = `全部上传完成！共上传${files.length}张图片到表格`;
        fileInput.value = ''; // 清空文件选择
      } catch (err) {
        status.className = 'status error';
        status.textContent = `上传失败：${err.message}`;
        console.error('上传错误：', err);
      } finally {
        // 重新启用按钮
        document.getElementById('uploadBtn').disabled = false;
      }
    }

    // 页面加载完成后初始化 + 绑定按钮事件
    window.onload = async () => {
      await init();
      document.getElementById('uploadBtn').addEventListener('click', handleBatchUpload);
    };
  </script>
</body>
</html>
